<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Carini - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0908;
            --text-color: #e8e6e3;
            --accent-color: #c8a06e;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }
        
        .card {
            width: 300px;
            height: 400px;
            border-radius: 20px;
            background: url('./foto-profilo.jpg') no-repeat center center/cover;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        
        .name {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .subtitle {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(30px);
        }
        
        .projects {
            padding: 50px 0;
        }
        
        .project-card {
            width: 300px;
            height: 200px;
            margin: 20px auto;
            border-radius: 10px;
            background-color: #333;
            transform: translateX(80px);
            opacity: 0;
        }
        
        .skills {
            padding: 50px 0;
        }
        
        .skill-bar {
            height: 30px;
            background-color: #333;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .skill-progress {
            height: 100%;
            background-color: var(--accent-color);
            width: 0;
        }
        
        .animation {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
        }
        
        .floating-card {
            width: 200px;
            height: 300px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: absolute;
            box-shadow: 0 0 20px var(--accent-color);
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="card" id="profile-card">
            <h1 class="name" id="name">Andrea Carini</h1>
            <p class="subtitle" id="subtitle">Sviluppo Aziendale | E-Commerce | Brand Design</p>
        </div>
    </section>
    
    <section class="projects">
        <div class="project-card" id="project1">Punto Cialde</div>
        <div class="project-card" id="project2">Il Ghiaccio Gourmet</div>
        <div class="project-card" id="project3">Ingrozone</div>
    </section>
    
    <section class="skills">
        <div class="skill">
            <h3>ERP/SAP</h3>
            <div class="skill-bar">
                <div class="skill-progress" id="erp-progress"></div>
            </div>
        </div>
        <div class="skill">
            <h3>E-Commerce</h3>
            <div class="skill-bar">
                <div class="skill-progress" id="ecommerce-progress"></div>
            </div>
        </div>
        <div class="skill">
            <h3>WordPress</h3>
            <div class="skill-bar">
                <div class="skill-progress" id="wordpress-progress"></div>
            </div>
        </div>
        <div class="skill">
            <h3>SEO</h3>
            <div class="skill-bar">
                <div class="skill-progress" id="seo-progress"></div>
            </div>
        </div>
        <div class="skill">
            <h3>Brand Design</h3>
            <div class="skill-bar">
                <div class="skill-progress" id="brand-design-progress"></div>
            </div>
        </div>
        <div class="skill">
            <h3>Claude Code</h3>
            <div class="skill-bar">
                <div class="skill-progress" id="claude-code-progress"></div>
            </div>
        </div>
    </section>
    
    <section class="animation">
        <div class="floating-card" id="card1"></div>
        <div class="floating-card" id="card2"></div>
        <div class="floating-card" id="card3"></div>
    </section>
    
    <script>
        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);
        
        // Hero Section Animations
        gsap.from("#profile-card", {
            duration: 1,
            rotationY: 90,
            ease: "power3.out"
        });
        
        gsap.from("#name", {
            duration: 0.5,
            opacity: 0,
            y: 30,
            stagger: 0.05,
            delay: 0.3
        });
        
        gsap.from("#subtitle", {
            duration: 0.5,
            opacity: 0,
            y: 30,
            delay: 0.8
        });
        
        gsap.to("#profile-card", {
            y: "+=8",
            duration: 3,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
        
        // Mousemove Tilt Effect
        document.getElementById("profile-card").addEventListener("mousemove", (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            gsap.to("#profile-card", {
                rotationY: xAxis,
                rotationX: yAxis,
                duration: 0.1
            });
        });
        
        // Projects Section Animations
        gsap.from("#project1", {
            scrollTrigger: {
                trigger: "#project1",
                start: "top 80%",
                once: true
            },
            x: -80,
            opacity: 0,
            duration: 1
        });
        
        gsap.from("#project2", {
            scrollTrigger: {
                trigger: "#project2",
                start: "top 80%",
                once: true
            },
            x: 80,
            opacity: 0,
            duration: 1
        });
        
        gsap.from("#project3", {
            scrollTrigger: {
                trigger: "#project3",
                start: "top 80%",
                once: true
            },
            x: -80,
            opacity: 0,
            duration: 1
        });
        
        // Skills Section Animations
        gsap.to("#erp-progress", {
            scrollTrigger: {
                trigger: "#erp-progress",
                start: "top 80%",
                once: true
            },
            width: "85%",
            duration: 1
        });
        
        gsap.to("#ecommerce-progress", {
            scrollTrigger: {
                trigger: "#ecommerce-progress",
                start: "top 80%",
                once: true
            },
            width: "90%",
            duration: 1
        });
        
        gsap.to("#wordpress-progress", {
            scrollTrigger: {
                trigger: "#wordpress-progress",
                start: "top 80%",
                once: true
            },
            width: "85%",
            duration: 1
        });
        
        gsap.to("#seo-progress", {
            scrollTrigger: {
                trigger: "#seo-progress",
                start: "top 80%",
                once: true
            },
            width: "80%",
            duration: 1
        });
        
        gsap.to("#brand-design-progress", {
            scrollTrigger: {
                trigger: "#brand-design-progress",
                start: "top 80%",
                once: true
            },
            width: "75%",
            duration: 1
        });
        
        gsap.to("#claude-code-progress", {
            scrollTrigger: {
                trigger: "#claude-code-progress",
                start: "top 80%",
                once: true
            },
            width: "70%",
            duration: 1
        });
        
        // Cinematic 3D Product Animation
        gsap.to(".floating-card", {
            rotationY: 360,
            duration: 8,
            repeat: -1,
            ease: "none"
        });
    </script>
</body>
</html>
